# =============================================================================
# Rescue-suit signature
# Describes the predefined pattern + color the YOLO detector is trained on, plus
# a fallback HSV color gate used to reject false positives (people NOT wearing
# the rescue suit are ignored).
# =============================================================================

rescue_suit:
  class_name: "rescue_suit"

  # Dominant suit color expressed as an HSV gate (OpenCV ranges: H 0-179, S/V 0-255).
  # Used as a secondary check after YOLO to suppress non-suit people.
  color_gate:
    enabled: true
    hsv_lower: [5, 120, 90]      # high-visibility orange, lower bound
    hsv_upper: [22, 255, 255]    # high-visibility orange, upper bound
    min_color_fraction: 0.18     # >=18% of the bbox must match the suit color

  # Retro-reflective stripe pattern signature. The detector is trained on the
  # striped pattern; this records the expected geometry for documentation and
  # optional template verification.
  pattern:
    name: "horizontal_retroreflective_stripes"
    stripe_count: 2
    stripe_color_hsv_lower: [0, 0, 180]    # bright silver/white stripes
    stripe_color_hsv_upper: [179, 40, 255]

  # Physical handles on the suit the manipulator grasps (shoulder loops).
  handles:
    - name: "left_shoulder_loop"
      nominal_offset_m: [0.0, 0.18, 0.05]   # relative to target torso frame
    - name: "right_shoulder_loop"
      nominal_offset_m: [0.0, -0.18, 0.05]
